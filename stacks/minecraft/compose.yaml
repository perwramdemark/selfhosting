services:
  mc:
    image: itzg/minecraft-server:latest
    container_name: minecraft
    tty: true
    stdin_open: true
    ports:
      - 25565:25565
    environment:
      EULA: "TRUE"
      MAX_PLAYERS: "6"
      MOTD: A Minecraft Server powered by Perra
      TZ: ${TZ}
      PAUSE_WHEN_EMPTY_SECONDS: "180"
      UID: ${PUID}
      GID: ${PGID}
    volumes:
      - /home/houdini/minecraft:/data
networks: {}
