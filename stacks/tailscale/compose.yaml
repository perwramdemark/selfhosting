services:
  tailscale-nginx:
    image: tailscale/tailscale:latest
    hostname: tailscale-houdini
    environment:
      - TS_AUTHKEY=${client_secret}
      - TS_EXTRA_ARGS=--advertise-tags=tag:container --advertise-exit-node
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_ROUTES=192.168.1.0/24
    volumes:
      - /home/houdini/tailscale:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv6.conf.all.forwarding: "1"
    restart: unless-stopped
    labels:
      glance.name: Tailscale
      glance.icon: sh:tailscale
      glance.description: VPN
networks: {}
