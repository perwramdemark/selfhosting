services:
  tinyauth:
    image: ghcr.io/steveiliop56/tinyauth:v4
    container_name: tinyauth
    restart: unless-stopped
    ports:
      - 3003:3000
    environment:
      - SECRET=${SECRET}
      - APP_URL=https://tinyauth.w8k.site
      - PROVIDERS_POCKETID_CLIENT_ID=bc74ab19-3941-45b3-b370-d1ae40dec47f
      - PROVIDERS_POCKETID_CLIENT_SECRET=${CLIENT_SECRET}
      - PROVIDERS_POCKETID_AUTH_URL=https://pocket-id.w8k.site/authorize
      - PROVIDERS_POCKETID_TOKEN_URL=https://pocket-id.w8k.site/api/oidc/token
      - PROVIDERS_POCKETID_USER_INFO_URL=https://pocket-id.w8k.site/api/oidc/userinfo
      - PROVIDERS_POCKETID_REDIRECT_URL=https://tinyauth.w8k.site/api/oauth/callback/pocketid
      - PROVIDERS_POCKETID_SCOPES=openid email profile groups
      - PROVIDERS_POCKETID_NAME=Pocket ID
      - OAUTH_AUTO_REDIRECT=pocketid
    volumes:
      - /home/houdini/tinyauth:/data
    labels:
      glance.name: Tinyauth
      glance.icon: sh:tinyfeed
      glance.url: https://tinyauth.w8k.site
      glance.description: SSO
networks: {}
