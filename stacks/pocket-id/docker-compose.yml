services:
  pocket-id:
    container_name: pocket-id
    image: ghcr.io/pocket-id/pocket-id:v2
    restart: unless-stopped
    env_file: .env
    ports:
      - 1411:1411
    volumes:
      - /home/houdini/pocket-id:/app/data
    # Optional healthcheck
    healthcheck:
      test: curl -f http://localhost:1411/healthz
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s
    labels:
      glance.name: Pocket ID
      glance.icon: sh:pocket-id
      glance.url: https://pocket-id.w8k.site
      glance.description: SSO passkeys
networks: {}
